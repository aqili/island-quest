<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Island Quest 🏝️</title>

  <!-- Kid-friendly font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet" />

  <!-- Babylon.js core + GUI from CDN (no build step needed) -->
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/babylon.gui.min.js"></script>

  <!-- Global styles -->
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <!-- 3D render surface -->
  <canvas id="renderCanvas"></canvas>

  <!-- Puzzle pop-up container (managed by PuzzleUI classes) -->
  <div id="ui-overlay"></div>

  <!-- HUD: island name + progress stars + crowns + respawn -->
  <div id="hud">
    <div id="hud-location"></div>
    <div id="hud-stars"></div>
    <div id="hud-crowns"></div>
    <div id="hud-exit" style="display:none">
      <button id="hud-exit-btn">🚪 Leave Castle</button>
    </div>
  </div>

  <!-- Entry point — ES6 module -->
  <script type="module" src="src/main.js"></script>
</body>
</html>
